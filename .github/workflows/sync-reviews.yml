name: Sync Google Reviews

on:
  schedule:
    - cron: '0 10 * * *' # Daily at 10am UTC (4am MDT)
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install google-auth requests

      - name: Sync reviews from GBP
        env:
          GBP_CLIENT_ID: ${{ secrets.GBP_CLIENT_ID }}
          GBP_CLIENT_SECRET: ${{ secrets.GBP_CLIENT_SECRET }}
          GBP_REFRESH_TOKEN: ${{ secrets.GBP_REFRESH_TOKEN }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
        run: python scripts/sync-reviews.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.json
          git diff --cached --quiet || git commit -m "chore: sync Google reviews"
          git push
